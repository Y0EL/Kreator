name: crawler-cron

on:
  schedule:
    - cron: "0 3,5,7,9,11,13,15 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  collect:
    if: github.event.schedule != '0 18 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Crawl sumber aktif
        run: curl -fsS -X POST "$BACKEND_URL/internal/crawl" -H "X-Internal-Token: $TOKEN"
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
      - name: Proses kandidat
        run: curl -fsS -X POST "$BACKEND_URL/internal/process" -H "X-Internal-Token: $TOKEN"
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}

  digest:
    if: github.event.schedule == '0 18 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Kirim digest ke Telegram
        run: curl -fsS -X POST "$BACKEND_URL/internal/digest" -H "X-Internal-Token: $TOKEN"
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
