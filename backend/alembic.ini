# Konfigurasi Alembic. URL dibaca dari env (DATABASE_URL) via alembic/env.py.
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url di-set runtime dari DATABASE_URL (lihat alembic/env.py)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
